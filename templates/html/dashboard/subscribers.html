{% include 'html/components/dashboard_nav.html' %}


<div class="grid columns-12 gap-6">
    <div class="g-col-12 mt-6">
        <div class=" my-5 p-5 bg-light rounded">
            <div class="row align-items-center">
              
                <div class="col-md-8">
                    <h1 class="text-uppercase lead mb-0" style="font-size: 24px; color:#1c3faa; font-weight: 400;">SHOW ALL subscribers</h1>
                </div>
                
            </div>
        </div>
        <div class="intro-y overflow-auto overflow-lg-visible mt-10 mt-sm-0">
            <table class="table table-report mt-sm-2">
                <thead>
                    <tr>
                        <th class="text-nowrap"></th>

                        <th class="text-nowrap text-uppercase text-center">Subscribers</th>
                        <th class="text-center text-nowrap">TOTAL BOOKS</th>
                        
                        <th class="text-center text-nowrap">ACTIONS</th>
                    </tr>
                </thead>
                <tbody>
                    {% for subscriber in subscribers %}
                    <tr class="intro-x">
                        <td class="text-center">{{ forloop.counter }}</td>
                      
                        <td class="text-center">
                            <a href="mailto:{{ subscriber.email }}" class="fw-medium text-nowrap">
                                <p>{{ subscriber.email }}</p>
                            </a> 
                            
                        </td>

                        
                        <td class="w-45">
                            <a href="mailto:{{ subscriber.email }}">
                                <div class="d-flex align-items-center justify-content-center text-theme-9">
                                    <i data-feather="send" class="w-4 h-4 me-2"></i> 
                                    Send Mail
                                </div>
                            </a>
                        </td>
                       
                        <td class="table-report__action w-56">
                            <div class="d-flex justify-content-center align-items-center">
                               

                                <div class="delete-form">
                                    <a class="delete-btn d-flex align-items-center text-theme-6" href="{% url 'dashboard:delete_subscribers' subscriber.id %}"> <i data-feather="trash-2" class="w-4 h-4 me-1"></i> Delete </a>
                                </div>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                        
                    {% endfor %}
                    

                </tbody>
            </table>
        </div>
        
    </div>
    <!-- END: Weekly Top Products -->
</div>

{% include 'html/components/dashboard_footer.html' %}
