{% load static %}
{% include 'html/components/dashboard_nav.html' %}
        <div class="d-flex">
            
            <!-- BEGIN: Content -->
            <div class="content">
              
                <div class="intro-y d-flex align-items-center mt-8">
                    <h2 class="fs-lg fw-medium me-auto">
                        Update Profile
                    </h2>
                </div>
                <div class=" gap-6">
                    
                    <div class="g-col-12 g-col-lg-12 g-col-xxl-9">
                        <!-- BEGIN: Display Information -->
                        <div class="intro-y box mt-lg-5">
                            <div class="d-flex align-items-center p-5 border-bottom border-gray-200 dark-border-dark-5">
                                <h2 class="fw-medium fs-base me-auto">
                                    Display Information
                                </h2>
                            </div>
                            <div class="p-5">
                                <div class="d-flex flex-column-reverse flex-xl-row flex-column">
                                    <div class="flex-1 mt-6 mt-xl-0">
                                        <div class="grid columns-12 gap-x-5 gap-y-0">
                                            <div class="g-col-12 g-col-xxl-6">
                                                <div>
                                                    <label for="update-profile-form-1" class="form-label">Display Name</label>
                                                    <input id="update-profile-form-1" type="text" class="form-control" placeholder="Input text" value="{{user.username}}" disabled>
                                                </div>
                                                <div class="mt-3">
                                                    <label for="update-profile-form-2" class="form-label">Email</label>
                                                    <input  type="text" class="form-control" placeholder="Input text" value="{{user.email}}" disabled>
                                                </div>
                                            </div>
                                            <div class="g-col-12 g-col-xxl-6">
                                                <div class="mt-3 mt-xxl-0">
                                                    <label for="update-profile-form-3" class="form-label">Postal Code</label>
                                                    <select id="update-profile-form-3" data-search="true" class="tom-select w-full">
                                                        <option value="1">018906 - 1 STRAITS BOULEVARD SINGA...</option>
                                                        <option value="2">018910 - 5A MARINA GARDENS DRIVE...</option>
                                                        <option value="3">018915 - 100A CENTRAL BOULEVARD...</option>
                                                        <option value="4">018925 - 21 PARK STREET MARINA...</option>
                                                        <option value="5">018926 - 23 PARK STREET MARINA...</option>
                                                    </select>
                                                </div>
                                                <div class="mt-3">
                                                    <label for="update-profile-form-4" class="form-label">Phone Number</label>
                                                    <input  type="text" class="form-control" placeholder="{{user.phone_number}}" value="{{user.phone_number}}">
                                                </div>
                                            </div>
                                            
                                        </div>
                                        <button type="button" class="btn btn-primary w-20 mt-4">Save</button>
                                    </div>
                                    <div class="w-52 mx-auto me-xl-0 ms-xl-6">
                                        <div class="border-2 border-dashed shadow-sm border-gray-200 dark-border-dark-5 rounded-2 p-5">
                                            <div class="h-40 position-relative image-fit cursor-pointer zoom-in mx-auto">
                                                <img class="rounded-2" alt="Rubick Bootstrap HTML Admin Template" src="{{user.profile.url}}">
                                                <div title="Remove this profile photo?" class="tooltip w-5 h-5 d-flex align-items-center justify-content-center position-absolute rounded-circle text-white bg-theme-6 end-0 top-0 me-n2 mt-n2"> <i data-feather="x" class="w-4 h-4"></i> </div>
                                            </div>
                                            <div class="mx-auto cursor-pointer position-relative mt-5">
                                                <button type="button" class="btn btn-primary w-full">Change Photo</button>
                                                <input type="file" class="w-full h-full top-0 start-0 position-absolute opacity-0">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- END: Display Information -->
                        <!-- BEGIN: Personal Information -->
                      
                        <!-- END: Personal Information -->
                    </div>
                </div>
            </div>
            <!-- END: Content -->
        </div>
        <!-- BEGIN: Dark Mode Switcher-->
{% include 'html/components/dashboard_footer.html' %}
