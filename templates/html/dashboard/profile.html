{% load static %}
{% include 'html/components/dashboard_nav.html' %}

        <div class="d-flex">
            
            <!-- BEGIN: Content -->
            <div class="content">
              
                <div class="intro-y d-flex align-items-center mt-8">
                    <h2 class="fs-lg fw-medium me-auto">
                        Update Profile
                    </h2>
                </div>
                <div class=" gap-6">
                    
                    <div class="g-col-12 g-col-lg-12 g-col-xxl-9">
                        <!-- BEGIN: Display Information -->
                        <div class="intro-y box mt-lg-5">
                            <div class="d-flex align-items-center p-5 border-bottom border-gray-200 dark-border-dark-5">
                                <h2 class="fw-medium fs-base me-auto">
                                    Display Information
                                </h2>
                            </div>
                            <div class="p-5">
                                <div class="d-flex flex-column-reverse flex-xl-row flex-column">
                                    <div class="flex-1 mt-6 mt-xl-0">
                                        <div class="grid columns-12 gap-x-5 gap-y-0">
                                            <div class="g-col-12 g-col-xxl-6">
                                                <form method="POST" action="{% url 'profile' user.id %}">
                                                    {% csrf_token %}
                                                <div>
                                                    <label for="update-profile-form-1" class="form-label">Display Name</label>
                                                    <input name="name" id="update-profile-form-1" type="text" class="form-control" placeholder="Input text" value="{{user.name}}" >
                                                </div>
                                                <div class="mt-3">
                                                    <label for="update-profile-form-4" class="form-label">Phone Number</label>
                                                    <input name="phone_number" type="text" class="form-control" placeholder="{{user.phone_number}}" value="{{user.phone_number}}">
                                                </div>
                                                <button type="submit" class="btn btn-primary w-20 mt-4">Save</button>
                                            </form>
                                            </div>

                                            <div class="g-col-12 g-col-xxl-6">
                                                
                                                <div class="">
                                                    <label for="update-profile-form-1" class="form-label">User Name</label>
                                                    <input  type="text" class="form-control" placeholder="Input text" value="{{user.username}}" disabled>
                                                </div>
                                                <div class="mt-3">
                                                    <label for="update-profile-form-2" class="form-label">Email</label>
                                                    <input  type="text" class="form-control" placeholder="Input text" value="{{user.email}}" disabled>
                                                </div>
                                            </div>
                                           

                                            
                                       
                                        </div>
                                        
                                    </div>

                                    {% if user.profile %}
                                    <form method="POST" enctype="multipart/form-data" action="{% url 'change_profile' user.id %}">
                                        {% csrf_token %}
                                        <div class="w-52 mx-auto me-xl-0 ms-xl-6">
                                            <div class="border-2 border-dashed shadow-sm border-gray-200 dark-border-dark-5 rounded-2 p-5">
                                                <div class="border-2 border-dashed dark-border-dark-5 rounded-2 ">
                                                    <div class="d-flex flex-wrap">
                                                        <div class="w-full h-40 position-relative image-fit  cursor-pointer zoom-in">
                                                            <img id="preview-image" class="rounded-2" src="{{user.profile.url}}">
                                                      
                                                                
                                                                <input onchange="previewImage(event)" name="image" type="file" class="w-full h-full top-0 start-0 position-absolute opacity-0" required>
                                                          
                                                        </div>
                                                    </div>
                                                    
                                                </div>
                                                <div class="mx-auto cursor-pointer position-relative mt-5">
                                                    <button type="submit" class="btn btn-primary w-full">Change Photo</button>
                                                    
                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                {% else %}
                                <form method="POST" enctype="multipart/form-data" action="{% url 'change_profile' user.id %}">
                                    {% csrf_token %}
                                    <div class="w-52 mx-auto me-xl-0 ms-xl-6">
                                        <div class="border-2 border-dashed shadow-sm border-gray-200 dark-border-dark-5 rounded-2 p-5">
                                            <div class="border-2 border-dashed dark-border-dark-5 rounded-2 ">
                                                <div class="d-flex flex-wrap">
                                                    <div class="w-full h-40 position-relative image-fit  cursor-pointer zoom-in">
                                                        <img id="preview-image" class="rounded-2" src="{% static 'dashboard/profile.webp' %}">
                                                  
                                                            
                                                            <input onchange="previewImage(event)" name="image" type="file" class="w-full h-full top-0 start-0 position-absolute opacity-0" required>
                                                      
                                                    </div>
                                                </div>
                                                
                                            </div>
                                            <div class="mx-auto cursor-pointer position-relative mt-5">
                                                <button type="submit" class="btn btn-primary w-full">Change Photo</button>
                                                
                                            </div>
                                        </div>
                                    </div>
                                </form>
                                   
                                {% endif %}
                                    
                                </div>
                            </div>
                        </div>
                        <!-- END: Display Information -->
                        <!-- BEGIN: Personal Information -->
                      
                        <!-- END: Personal Information -->
                    </div>
                </div>

                <div class=" gap-6">
                    
                    <div class="g-col-12 g-col-lg-12 g-col-xxl-9">
                        <!-- BEGIN: Display Information -->
                        <div class="intro-y box mt-lg-5">
                            <div class="d-flex align-items-center p-5 border-bottom border-gray-200 dark-border-dark-5">
                                <h2 class="fw-medium fs-base me-auto">
                                    Change Password
                                </h2>
                            </div>
                            <div class="p-5">
                                <div class="d-flex flex-column-reverse flex-xl-row flex-column">
                                 
                                    <div class="flex-1 mt-6 mt-xl-0">
                                        <form method="POST" action="{% url 'change_password' %}">
                                            {% csrf_token %}
                                        <div class="grid columns-12 gap-x-5 gap-y-0">
                                            <div class="g-col-12 g-col-xxl-6">
                                                
                                                <div class="">
                                                    <label class="form-label">Current Password</label>
                                                    <input name="password" type="text" class="form-control" placeholder="Enter your Current Password" required>
                                                </div>
                                                <div class="mt-3">
                                                    <label  class="form-label">New Password</label>
                                                    <input id="password" onchange="checkPassword()" name="new_password" type="text" class="form-control" placeholder="Enter your new Password" required>
                                                </div>
                                                <div class="mt-3">
                                                    <label  class="form-label">Confirm Password</label>
                                                    <input id="confirm_password" onkeyup="checkPassword()" name="confirm_password" type="text" class="form-control" placeholder="Enter your Confirm Password" required>
                                                </div>
                                                <span id="pass_check"></span>

                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary w-20 mt-4">Save</button>
                                    </form>
                                    </div>
                               
                                </div>
                            </div>
                        </div>
                        <!-- END: Display Information -->
                        <!-- BEGIN: Personal Information -->
                      
                        <!-- END: Personal Information -->
                    </div>
                </div>
            </div>
            <!-- END: Content -->
        </div>
        <!-- BEGIN: Dark Mode Switcher-->
{% include 'html/components/dashboard_footer.html' %}
